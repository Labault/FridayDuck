<svg width="1200" height="300" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Le Canard du Vendredi, every Friday, the internet collaborates to caffeinate a duck">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- paper -->
  <rect width="1200" height="300" fill="#f4f5f7"/>
  <rect x="0" y="296" width="1200" height="4" fill="#e7b400" opacity="0.55"/>

  <!-- coffee-ring stamp, top-right, faint -->
  <circle cx="1152" cy="48" r="30" fill="none" stroke="#8a5a00" stroke-width="7" opacity="0.10"/>
  <circle cx="1152" cy="48" r="30" fill="none" stroke="#8a5a00" stroke-width="2" opacity="0.10" transform="translate(6 4)"/>

  <!-- text block -->
  <text x="68" y="92" font-size="15" font-weight="700" letter-spacing="3" fill="#8a5a00">FRIDAY-ONLY · OPEN SOURCE · USELESS BY DESIGN</text>
  <text x="66" y="158" font-size="54" font-weight="800" fill="#1c2127">Le Canard du Vendredi</text>
  <text x="68" y="198" font-size="22" fill="#5b626c">Every Friday, the internet collaborates to caffeinate a duck.</text>
  <text x="68" y="234" font-size="16" font-style="italic" fill="#8a5a00">The joke is the product. The rigor is the code.</text>

  <!-- ground shadow -->
  <ellipse cx="985" cy="256" rx="128" ry="16" fill="#000000" opacity="0.06"/>

  <!-- steaming mug -->
  <g>
    <path d="M848 190 q-9 -13 0 -26 q9 -13 0 -26" fill="none" stroke="#b9bec7" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <path d="M872 184 q-9 -13 0 -26 q9 -13 0 -26" fill="none" stroke="#b9bec7" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M888 212 q28 4 28 24 q0 20 -28 22" fill="none" stroke="#cfd4dc" stroke-width="6"/>
    <rect x="824" y="198" width="64" height="60" rx="11" fill="#ffffff" stroke="#cfd4dc" stroke-width="3"/>
    <path d="M826 236 h60 v9 a10 10 0 0 1 -10 10 h-40 a10 10 0 0 1 -10 -10 z" fill="#ffe9a8"/>
    <ellipse cx="856" cy="200" rx="27" ry="7" fill="#6f4a1f"/>
  </g>

  <!-- duck -->
  <g stroke-linejoin="round">
    <!-- tail -->
    <path d="M912 178 q-36 -8 -56 6 q24 12 56 16 z" fill="#f2c200" stroke="#e7b400" stroke-width="3"/>
    <!-- body -->
    <ellipse cx="990" cy="192" rx="82" ry="64" fill="#ffd23f" stroke="#e7b400" stroke-width="3"/>
    <!-- belly -->
    <ellipse cx="984" cy="210" rx="55" ry="41" fill="#fff1c2"/>
    <!-- wing -->
    <path d="M958 168 q60 -4 90 30 q-30 30 -82 18 q-14 -24 -8 -48 z" fill="#ffdd6b" stroke="#e7b400" stroke-width="3"/>
    <!-- head -->
    <circle cx="1034" cy="128" r="48" fill="#ffd23f" stroke="#e7b400" stroke-width="3"/>
    <!-- hair tuft -->
    <path d="M1020 84 q4 -18 18 -20 q-3 13 6 19 z" fill="#ffd23f" stroke="#e7b400" stroke-width="2"/>
    <!-- beak -->
    <path d="M1074 118 l54 9 l-54 17 q-9 -13 0 -26 z" fill="#ef8b2c" stroke="#d8771f" stroke-width="2"/>
    <line x1="1076" y1="131" x2="1124" y2="129" stroke="#d8771f" stroke-width="2" stroke-linecap="round"/>
    <!-- eye (tired) -->
    <ellipse cx="1042" cy="122" rx="13" ry="14" fill="#ffffff" stroke="#2a2f37" stroke-width="2"/>
    <circle cx="1046" cy="125" r="6.5" fill="#1c2127"/>
    <circle cx="1043" cy="121" r="2" fill="#ffffff"/>
    <path d="M1028 116 q14 -10 28 0" fill="none" stroke="#2a2f37" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
