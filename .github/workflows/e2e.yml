name: E2E

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # e2e PRODUIT (§31.3, Phase 8a) : Playwright contre la stack RÉELLE montée en
  # compose (app+ext PECL, Postgres isolé, hub Mercure, RELAIS outbox actif).
  playwright:
    name: Playwright (stack réelle)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # Build vite PROD (Studio tree-shaké, §15.4) → public/build embarqué dans l'image.
      - name: Build front assets (prod)
        run: npm run build

      - name: Build & start the e2e stack (app+ext, PG, hub, relais)
        run: docker compose -f compose.e2e.yaml up -d --build

      - name: Wait for the apps to be healthy
        run: |
          for port in 8081 8082 8083; do
            echo "Attente de http://localhost:$port/health/ready ..."
            for i in $(seq 1 60); do
              if curl -fsS "http://localhost:$port/health/ready" >/dev/null 2>&1; then
                echo "port $port OK"; break
              fi
              if [ "$i" -eq 60 ]; then echo "port $port KO"; exit 1; fi
              sleep 2
            done
          done

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stack logs on failure
        if: failure()
        run: docker compose -f compose.e2e.yaml logs --no-color

      - name: Tear down
        if: always()
        run: docker compose -f compose.e2e.yaml down -v
