# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Fuseau métier (§7.2) — UNIQUE point configurable. Injecté dans le Domaine
    # via le bind $businessTimezone ci-dessous ; jamais codé en dur ailleurs.
    app.business_timezone: 'Europe/Paris'
    # Cible de café d'une édition (§8.3) : nombre de cafés pour une énergie pleine.
    # La mécanique d'énergie arrive en Phase 2a-ii ; ici, valeur par défaut posée
    # à la création de l'édition.
    app.coffee_target: 100
    # Nom de service OTLP par défaut (§26.1) si OTEL_SERVICE_NAME n'est pas défini.
    app.otel_default_service: 'friday-duck'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $businessTimezone: '%app.business_timezone%'
            int $coffeeTarget: '%app.coffee_target%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Horloge configurable (dev / préprod / test) : lit APP_FAKE_NOW (§7.4).
    App\Infrastructure\Clock\ConfigurableClock:
        arguments:
            $systemClock: '@App\Infrastructure\Clock\SystemClock'
            $fakeNow: '%env(string:default::APP_FAKE_NOW)%'
            $logger: '@?logger'

    # Par défaut (prod + repli) : horloge SYSTÈME → APP_FAKE_NOW SANS effet (§7.4).
    App\Domain\Shared\Clock\ClockInterface: '@App\Infrastructure\Clock\SystemClock'

    # Port temps réel (§20, §24.5) → OUTBOX transactionnel (Phase 6b). publish()
    # écrit une ligne d'outbox dans la transaction métier (atomicité) ; un relais
    # publie ensuite sur Mercure via RealTimeTransport (invariants A/D). La bascule
    # est CETTE seule ligne ; MercureDomainEventPublisher reste dans l'arbre (non
    # câblé) le temps de la transition. Les transports/relais/métriques à impl
    # unique (RealTimeTransport→Mercure, RelayMetrics→Null, OutboxEntryRepository)
    # sont auto-aliasés par autowiring.
    App\Application\RealTime\DomainEventPublisher: '@App\Infrastructure\RealTime\OutboxDomainEventPublisher'

    # ── Télémétrie OpenTelemetry (Phase 7a, §26) ─────────────────────────────
    # Socle SDK : export OTLP vers un Collector configurable. Endpoint VIDE ⇒
    # désactivé (providers no-op) → zéro surcoût en local/test. Non bloquant +
    # discipline worker gérés dans le service (risques A/B).
    App\Infrastructure\Telemetry\TelemetrySdk:
        arguments:
            $endpoint: '%env(string:default::OTEL_EXPORTER_OTLP_ENDPOINT)%'
            $serviceName: '%env(string:default:app.otel_default_service::OTEL_SERVICE_NAME)%'
            $serviceVersion: '%env(string:default::APP_VERSION)%'
            $environment: '%kernel.environment%'
            $logger: '@logger'

    # Ports de télémétrie → implémentations OTLP (plusieurs impls → alias explicite).
    App\Application\Telemetry\Tracer: '@App\Infrastructure\Telemetry\OtelTracer'
    App\Application\Telemetry\Metrics: '@App\Infrastructure\Telemetry\OtelMetrics'

    # Phase 7a : le hook RelayMetrics posé en 6b passe de Null à OTLP (backlog +
    # mercure.publish.*). Le port ne bouge pas — simple bascule d'alias.
    App\Application\RealTime\RelayMetrics: '@App\Infrastructure\Telemetry\OtelRelayMetrics'

    # Phase 7c : émetteur de jauges de diagnostic (alertes §26.7). Reçoit le fuseau
    # métier, la valeur APP_FAKE_NOW (surveillée, §7.4) et l'environnement.
    App\Infrastructure\Telemetry\DiagnosticsMetricsEmitter:
        arguments:
            $appFakeNow: '%env(string:default::APP_FAKE_NOW)%'
            $environment: '%kernel.environment%'

# Hors production uniquement, l'horloge devient configurable : la liaison prod
# reste SystemClock par construction (garde-fou structurel, §7.4).
when@dev:
    services:
        App\Domain\Shared\Clock\ClockInterface: '@App\Infrastructure\Clock\ConfigurableClock'

when@preprod:
    services:
        App\Domain\Shared\Clock\ClockInterface: '@App\Infrastructure\Clock\ConfigurableClock'

when@test:
    services:
        App\Domain\Shared\Clock\ClockInterface: '@App\Infrastructure\Clock\ConfigurableClock'
        # Pas de publication réseau en test : le port est neutralisé (les tests
        # dédiés à la publication injectent leur propre espion).
        App\Tests\Double\NullDomainEventPublisher: ~
        App\Application\RealTime\DomainEventPublisher: '@App\Tests\Double\NullDomainEventPublisher'
