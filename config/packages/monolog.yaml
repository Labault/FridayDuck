monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            # Phase 7a : pont vers OTLP — les logs émis dans un span portent
            # trace_id/span_id (corrélation logs ↔ traces). Inerte si OTEL désactivé.
            otel:
                type: service
                id: App\Infrastructure\Telemetry\OtelMonologHandler
                channels: ["!event", "!doctrine", "!deprecation"]

# Préproduction (e2e/observabilité, Phase 8b) : env PROD-LIKE qui honore l'horloge
# simulée (APP_FAKE_NOW) tout en émettant les MÊMES signaux que la prod. Sans ce
# bloc, preprod n'aurait aucun handler Monolog → AUCUN log OTLP (corrélation
# logs ↔ traces invérifiable). Reprend le pont `otel` et la sortie stderr JSON.
when@preprod:
    monolog:
        handlers:
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            otel:
                type: service
                id: App\Infrastructure\Telemetry\OtelMonologHandler
                channels: ["!event", "!doctrine", "!deprecation"]
