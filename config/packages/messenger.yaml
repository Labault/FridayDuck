framework:
    messenger:
        # File d'échec (§25.4) : messages non traités après retries → transport `failed`.
        failure_transport: failed

        transports:
            # Cycle proactif (§25.1) : table Doctrine, consommée par un worker.
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            # File d'échec inspectable / rejouable (messenger:failed:show|retry).
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            # Les étapes de cycle planifiées sont traitées en asynchrone.
            App\Infrastructure\Messaging\RunCycleStep: async
            # Relais de l'outbox (§20.6) : publication Mercure asynchrone ; un échec
            # est rejoué puis basculé en file d'échec (§25.4, invariant E).
            App\Infrastructure\Messaging\RelayOutbox: async
            # Tick de diagnostic (§26.7) : émet les jauges d'alerte.
            App\Infrastructure\Messaging\EmitDiagnostics: async

when@test:
    framework:
        messenger:
            transports:
                # En test, on n'exerce pas le transport : traitement synchrone.
                async: 'sync://'
                failed: 'sync://'
