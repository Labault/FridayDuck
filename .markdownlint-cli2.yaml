# markdownlint-cli2 configuration.
config:
  default: true
  # Allow long lines (URLs, tables) — line length is not a useful gate here.
  MD013: false
  # Allow inline HTML (badges, details/summary).
  MD033: false
  # First line in file need not be a top-level heading.
  MD041: false
  # Don't enforce table pipe alignment — cosmetic and painful with prose cells.
  MD060: false
  # Allow repeated subsection names (Added, Changed, …) under different parents,
  # e.g. one per version in a CHANGELOG.
  MD024:
    siblings_only: true
# No `globs` here on purpose: the pre-commit hook passes the files to lint, and
# the CI action sets its own globs. Listing globs would also lint git-ignored
# files. `make lint` covers everything via `pre-commit run --all-files`.
ignores:
  - "**/node_modules/**"
  - "**/vendor/**"
  # Le cahier des charges est un document de RÉFÉRENCE fourni (mise en forme de
  # l'auteur : sections en H1 « # 1. », « # 2. »…). On ne lui impose pas nos
  # règles de style markdown.
  - "docs/cdc_friday_duck.md"
