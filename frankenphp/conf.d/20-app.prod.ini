; Surcharges de production.
; OPcache fige les fichiers (pas de revalidation à chaud) : l'image est immuable.
opcache.validate_timestamps = 0
opcache.preload_user = www-data

; Préchargement OPcache (perf §22.2). Activé en Phase 9 avec le durcissement de
; l'image prod, une fois le conteneur de prod réellement exercé :
; opcache.preload = /app/config/preload.php
