# Alertmanager PROD (§26.7) — route TOUTES les alertes infra vers le pont ntfy.
#
# Pas de basic-auth sur le webhook : `ntfy-alertmanager` n'est joignable que sur le
# réseau `obs-internal` (backends d'obs uniquement — l'app n'y est pas, zéro
# internet). Le seul secret réel (token d'écriture ntfy) vit dans la config scfg
# root-only du pont, pas ici.
route:
  receiver: ntfy
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: ntfy
    webhook_configs:
      - url: "http://ntfy-alertmanager:8080"
        send_resolved: true
