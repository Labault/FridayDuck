# Prometheus PROD (§21/§26) — scrape l'exporter du Collector, évalue les règles
# INFRA et les route vers Alertmanager. Rétention 30 j fixée par flag CLI dans le
# compose (--storage.tsdb.retention.time=30d), pas ici.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.infra.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
